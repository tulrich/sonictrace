name: Compile C++ to WASM

on:
  push:
    branches: [ main ]
    paths:
      - 'solver/**'
      - '.github/workflows/compile-wasm.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: latest

    - name: Download Eigen
      run: |
        curl -L https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz -o eigen.tar.gz
        tar -xzf eigen.tar.gz
        mv eigen-3.4.0 eigen-src

    - name: Compile WASM
      run: |
        mkdir -p public
        emcc --bind -O3 -msimd128 -I eigen-src/ solver/fdtd_solver.cc solver/engine_bridge.cc \
          -s WASM=1 \
          -s EXPORT_ES6=1 \
          -s MODULARIZE=1 \
          -s EXPORT_NAME='createEngine' \
          -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap"]' \
          -o public/engine.js
        ls -R public/
        git add -f public/engine.js public/engine.wasm

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: remote WASM build [skip ci]"
        file_pattern: 'public/engine.*'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
